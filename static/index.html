<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ATM Simulation System — Secure banking operations powered by FastAPI" />
    <title>ATM Simulation System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════ Particle canvas background ═══════════ -->
<canvas id="particle-canvas"></canvas>

<!-- ═══════════ LOGIN SCREEN ═══════════ -->
<section id="login-section" class="auth-section active">
    <div class="glass-card auth-card fade-in">
        <div class="card-glow"></div>
        <div class="atm-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 48 48" fill="none">
                    <rect x="6" y="10" width="36" height="28" rx="4" stroke="currentColor" stroke-width="2.5"/>
                    <rect x="12" y="16" width="24" height="12" rx="2" fill="currentColor" opacity="0.15"/>
                    <circle cx="18" cy="34" r="1.5" fill="currentColor"/>
                    <circle cx="24" cy="34" r="1.5" fill="currentColor"/>
                    <circle cx="30" cy="34" r="1.5" fill="currentColor"/>
                    <rect x="20" y="4" width="8" height="6" rx="2" stroke="currentColor" stroke-width="2"/>
                </svg>
            </div>
            <h1>SecureATM</h1>
            <p class="subtitle">Fast &bull; Secure &bull; Reliable</p>
        </div>
        <form id="login-form" autocomplete="off">
            <div class="input-group">
                <label for="login-email">Email Address</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="login-email" placeholder="you@example.com" required />
                </div>
            </div>
            <div class="input-group">
                <label for="login-password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="login-password" placeholder="••••••••" required />
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="login-btn">
                <span class="btn-text">Sign In</span>
                <span class="btn-loader"></span>
            </button>
        </form>
        <p class="auth-switch">
            Don&rsquo;t have an account? <a href="#" id="goto-signup">Create one</a>
        </p>
    </div>
</section>

<!-- ═══════════ SIGNUP SCREEN ═══════════ -->
<section id="signup-section" class="auth-section">
    <div class="glass-card auth-card fade-in">
        <div class="card-glow"></div>
        <div class="atm-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 48 48" fill="none">
                    <rect x="6" y="10" width="36" height="28" rx="4" stroke="currentColor" stroke-width="2.5"/>
                    <rect x="12" y="16" width="24" height="12" rx="2" fill="currentColor" opacity="0.15"/>
                    <circle cx="18" cy="34" r="1.5" fill="currentColor"/>
                    <circle cx="24" cy="34" r="1.5" fill="currentColor"/>
                    <circle cx="30" cy="34" r="1.5" fill="currentColor"/>
                    <rect x="20" y="4" width="8" height="6" rx="2" stroke="currentColor" stroke-width="2"/>
                </svg>
            </div>
            <h1>Create Account</h1>
            <p class="subtitle">Join SecureATM today</p>
        </div>
        <form id="signup-form" autocomplete="off">
            <div class="input-group">
                <label for="signup-name">Full Name</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="signup-name" placeholder="John Doe" required minlength="2" />
                </div>
            </div>
            <div class="input-group">
                <label for="signup-email">Email Address</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="signup-email" placeholder="you@example.com" required />
                </div>
            </div>
            <div class="input-group">
                <label for="signup-password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="signup-password" placeholder="Min 4 characters" required minlength="4" />
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="signup-btn">
                <span class="btn-text">Create Account</span>
                <span class="btn-loader"></span>
            </button>
        </form>
        <p class="auth-switch">
            Already have an account? <a href="#" id="goto-login">Sign in</a>
        </p>
    </div>
</section>

<!-- ═══════════ DASHBOARD ═══════════ -->
<section id="dashboard-section" class="dashboard-section">

    <!-- Top bar -->
    <header class="dash-header fade-in">
        <div class="header-left">
            <div class="logo-icon small">
                <svg viewBox="0 0 48 48" fill="none">
                    <rect x="6" y="10" width="36" height="28" rx="4" stroke="currentColor" stroke-width="2.5"/>
                    <rect x="12" y="16" width="24" height="12" rx="2" fill="currentColor" opacity="0.15"/>
                    <circle cx="18" cy="34" r="1.5" fill="currentColor"/>
                    <circle cx="24" cy="34" r="1.5" fill="currentColor"/>
                    <circle cx="30" cy="34" r="1.5" fill="currentColor"/>
                    <rect x="20" y="4" width="8" height="6" rx="2" stroke="currentColor" stroke-width="2"/>
                </svg>
            </div>
            <span class="brand">SecureATM</span>
        </div>
        <div class="header-right">
            <span class="user-greeting" id="user-greeting">Hello, User</span>
            <button class="btn btn-outline btn-sm" id="logout-btn">Logout</button>
        </div>
    </header>

    <!-- Welcome banner -->
    <div class="welcome-banner fade-in" id="welcome-banner">
        <h2 id="welcome-text"></h2>
        <p>Manage your finances securely.</p>
    </div>

    <!-- Balance card -->
    <div class="balance-card glass-card fade-in">
        <div class="card-glow"></div>
        <p class="balance-label">Current Balance</p>
        <h2 class="balance-amount" id="balance-display">$0.00</h2>
        <div class="balance-chip">
            <span class="chip-dot"></span>
            <span>Active Account</span>
        </div>
    </div>

    <!-- Operations grid -->
    <div class="operations-grid fade-in">

        <!-- Deposit -->
        <div class="op-card glass-card">
            <div class="card-glow"></div>
            <h3>💵 Deposit</h3>
            <form id="deposit-form" autocomplete="off">
                <div class="input-wrapper">
                    <span class="input-icon">$</span>
                    <input type="number" id="deposit-amount" placeholder="Amount" min="1" step="0.01" required />
                </div>
                <button type="submit" class="btn btn-success">Deposit</button>
            </form>
        </div>

        <!-- Withdraw -->
        <div class="op-card glass-card">
            <div class="card-glow"></div>
            <h3>💸 Withdraw</h3>
            <form id="withdraw-form" autocomplete="off">
                <div class="input-wrapper">
                    <span class="input-icon">$</span>
                    <input type="number" id="withdraw-amount" placeholder="Amount" min="1" step="0.01" required />
                </div>
                <button type="submit" class="btn btn-danger">Withdraw</button>
            </form>
        </div>

    </div>

</section>

<!-- ═══════════ Toast container ═══════════ -->
<div id="toast-container"></div>

<script src="script.js"></script>
</body>
</html>
